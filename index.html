<!DOCTYPE html>
<html>
<head>
  <title>WE5SCORED Framework</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 40px;
      background: #ffffff;
      color: #1d1d1f;
      text-align: center;
    }

    h1 {
      font-size: 48px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      gap: 20px;
      justify-content: center;
      margin-top: 60px;
    }

    .box {
      border: 1px solid #e5e5e7;
      padding: 30px;
      font-size: 28px;
      cursor: pointer;
      transition: 0.2s;
    }

    .box:hover {
      background: #f5f5f7;
    }
  </style>
</head>
<body>

<h1>WE5SCORED</h1>
<p>A structured way to think, decide, and execute.</p>

<div class="grid">
  <div class="box">W</div>
  <div class="box">E</div>
  <div class="box">5</div>
  <div class="box">S</div>
  <div class="box">C</div>
  <div class="box">O</div>
  <div class="box">R</div>
  <div class="box">E</div>
  <div class="box">D</div>
</div>

</body>
</html>
