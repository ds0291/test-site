<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WE5SCORED Framework</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #000000;
      color: #f5f5f7;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .hero-section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
      background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
    }

    .hero-content {
      max-width: 980px;
      text-align: center;
      opacity: 0;
      animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 600;
      letter-spacing: -0.015em;
      line-height: 1.05;
      margin-bottom: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: clamp(21px, 2.5vw, 28px);
      font-weight: 400;
      line-height: 1.4;
      color: #a1a1a6;
      margin-bottom: 64px;
      letter-spacing: 0.007em;
    }

    .framework-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 0;
      opacity: 0;
      animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
    }

    .letter-card {
      aspect-ratio: 1;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(40px, 5vw, 64px);
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .letter-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .letter-card:hover {
      transform: scale(1.05) translateY(-8px);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .letter-card:hover::before {
      opacity: 1;
    }

    .letter-card:active {
      transform: scale(0.98) translateY(-4px);
    }

    .description-section {
      max-width: 692px;
      margin: 80px auto 0;
      text-align: center;
      opacity: 0;
      animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
    }

    .description-text {
      font-size: 17px;
      line-height: 1.6;
      color: #86868b;
      font-weight: 400;
      letter-spacing: -0.022em;
    }

    .floating-elements {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .floating-circle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
      animation: float 20s infinite ease-in-out;
    }

    .circle-1 {
      width: 400px;
      height: 400px;
      top: -200px;
      right: -100px;
      animation-delay: 0s;
    }

    .circle-2 {
      width: 600px;
      height: 600px;
      bottom: -300px;
      left: -200px;
      animation-delay: -10s;
    }

    @keyframes float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(30px, -30px) scale(1.1);
      }
      66% {
        transform: translate(-20px, 20px) scale(0.9);
      }
    }

    @media (max-width: 768px) {
      .framework-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        padding: 32px 0;
      }

      .letter-card {
        font-size: 36px;
        border-radius: 20px;
      }

      .hero-section {
        padding: 32px 20px;
      }

      .description-section {
        margin-top: 60px;
        padding: 0 20px;
      }
    }

    @media (max-width: 480px) {
      .letter-card {
        font-size: 28px;
        border-radius: 16px;
      }

      .framework-grid {
        gap: 12px;
      }
    }
  </style>
</head>
<body>

<div class="hero-section">
  <div class="floating-elements">
    <div class="floating-circle circle-1"></div>
    <div class="floating-circle circle-2"></div>
  </div>

  <div class="hero-content">
    <h1>WE5SCORED</h1>
    <p class="tagline">A structured way to think, decide, and execute.</p>

    <div class="framework-grid">
      <div class="letter-card">W</div>
      <div class="letter-card">E</div>
      <div class="letter-card">5</div>
      <div class="letter-card">S</div>
      <div class="letter-card">C</div>
      <div class="letter-card">O</div>
      <div class="letter-card">R</div>
      <div class="letter-card">E</div>
      <div class="letter-card">D</div>
    </div>

    <div class="description-section">
      <p class="description-text">
        Designed to bring clarity to complex decisions. Each letter represents a critical dimension of thoughtful execution, empowering you to move from insight to action with precision and purpose.
      </p>
    </div>
  </div>
</div>

</body>
</html>
